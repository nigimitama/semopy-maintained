image: "ghcr.io/astral-sh/uv:python3.9-bookworm"

before_script:
  - uv sync --extra dev

stages:
  - static
  - tests

static_analysis:
  stage: static
  script:
    - uv run flake8 --extend-ignore=BLK100,E127,E731,E741,W291,W293 --extend-exclude=__init__.py --max-line-length=120 semopy

unit_tests:
  stage: tests
  script:
    - uv run pytest semopy/tests
