name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.9"
          enable-cache: true
      - name: Run flake8
        run: uv run --extra dev flake8 --extend-ignore=BLK100,E127,E731,E741,W291,W293 --extend-exclude=__init__.py --max-line-length=120 semopy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Run tests
        run: uv run --extra dev pytest semopy/tests --cov=semopy --cov-report=term-missing
